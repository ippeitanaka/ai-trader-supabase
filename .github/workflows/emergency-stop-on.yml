name: Emergency Stop ON (Mobile)

on:
  workflow_dispatch:

jobs:
  emergency-stop-on:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: emergency-stop-control
      cancel-in-progress: false

    steps:
      - name: ЁЯУж Checkout
        uses: actions/checkout@v4

      - name: ЁЯЫая╕П Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: тЬЕ Validate required secrets
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$PROJECT_REF" ]; then
            echo "тЭМ Missing secret: SUPABASE_PROJECT_REF"
            exit 1
          fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "тЭМ Missing secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          echo "тЬЕ Required secrets are set"

      - name: ЁЯФЧ Link Supabase project
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$PROJECT_REF"

      - name: ЁЯЪи Enable emergency stop
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          FLAG="on"
          LABEL="EMERGENCY STOP ENABLED"
          REASON="mobile-no-input-stop"

          supabase secrets set AI_TRADER_EMERGENCY_STOP="$FLAG" --project-ref "$PROJECT_REF"

          # Ensure runtime picks latest secret value.
          supabase functions deploy ai-trader --project-ref "$PROJECT_REF" --no-verify-jwt

          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo "${LABEL}"
          echo "mode=stop"
          echo "AI_TRADER_EMERGENCY_STOP=${FLAG}"
          echo "reason=${REASON}"
          echo "time_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "time_jst=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"

      - name: ЁЯФН Verify emergency stop status
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          EXPECTED=true
          URL="https://${PROJECT_REF}.supabase.co/functions/v1/ai-trader"

          for i in $(seq 1 12); do
            RESP=$(curl -fsS "$URL") || true
            FLAG=$(printf '%s' "$RESP" | sed -n 's/.*"emergency_stop_enabled"[[:space:]]*:[[:space:]]*\(true\|false\).*/\1/p' | head -n 1)
            if [ -z "$FLAG" ]; then FLAG="unknown"; fi

            if [ "$FLAG" = "$EXPECTED" ]; then
              echo "тЬЕ emergency_stop_enabled=${FLAG} verified (attempt=${i})"
              exit 0
            fi

            echo "тП│ waiting for runtime refresh (attempt=${i}, got=${FLAG})"
            sleep 5
          done

          echo "тЭМ emergency stop verification failed. expected=${EXPECTED}, got=${FLAG}"
          echo "Last response: ${RESP}"
          exit 1
