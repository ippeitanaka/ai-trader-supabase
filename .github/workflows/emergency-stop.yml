name: Emergency Stop Control

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Select operation: stop or resume'
        required: true
        type: choice
        options:
          - stop
          - resume
      reason:
        description: 'Optional operation note (audit purpose)'
        required: false
        default: ''

jobs:
  emergency-stop-control:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: emergency-stop-control
      cancel-in-progress: false

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: ✅ Validate required secrets
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$PROJECT_REF" ]; then
            echo "❌ Missing secret: SUPABASE_PROJECT_REF"
            exit 1
          fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "❌ Missing secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          echo "✅ Required secrets are set"

      - name: 🔗 Link Supabase project
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$PROJECT_REF"

      - name: 🚨 Toggle emergency stop
        env:
          MODE: ${{ github.event.inputs.mode }}
          REASON: ${{ github.event.inputs.reason }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          case "$MODE" in
            stop)
              FLAG="on"
              LABEL="EMERGENCY STOP ENABLED"
              ;;
            resume)
              FLAG="off"
              LABEL="EMERGENCY STOP DISABLED (RESUMED)"
              ;;
            *)
              echo "❌ Invalid mode: $MODE"
              exit 1
              ;;
          esac

          supabase secrets set AI_TRADER_EMERGENCY_STOP="$FLAG" --project-ref "$PROJECT_REF"

          # Ensure runtime picks latest secret value.
          supabase functions deploy ai-trader --project-ref "$PROJECT_REF" --no-verify-jwt

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "${LABEL}"
          echo "mode=${MODE}"
          echo "AI_TRADER_EMERGENCY_STOP=${FLAG}"
          echo "reason=${REASON}"
          echo "time_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "time_jst=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
